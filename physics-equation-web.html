<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQA Physics — Equation Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080c14;
  --mech:   #f0a500;
  --waves:  #00d68f;
  --parts:  #ff6b9d;
  --elec:   #9b8fff;
  --shm:    #ffe57a;
  --fields: #4dabf7;
  --nuke:   #ffa94d;
  --therm:  #ff6b6b;
  --astro:  #38d9d9;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: #e0eaf8;
}

/* ── CANVAS LAYER ── */
#link-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* ── NODE LAYER ── */
#node-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

/* ── WORLD (single transform container) ── */
#world {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  pointer-events: none;
}

.node-card {
  position: absolute;
  width: 148px;
  pointer-events: auto;
  cursor: pointer;
  user-select: none;
}

.node-inner {
  background: #0d1526;
  border-radius: 8px;
  border: 1.5px solid rgba(255,255,255,0.08);
  padding: 8px 10px 7px;
  border-left: 3.5px solid var(--tc);
  transition: background 0.18s, border-color 0.18s, transform 0.18s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

.node-card:hover .node-inner,
.node-card.selected .node-inner {
  background: #14213a;
  transform: scale(1.04);
}

.node-card.selected .node-inner {
  border-left-color: var(--tc);
  border-color: var(--tc);
  box-shadow: 0 0 0 2px var(--tc), 0 4px 24px rgba(0,0,0,0.7);
}

.node-card.dimmed {
  opacity: 0.12;
  pointer-events: none;
}

.node-card.neighbour .node-inner {
  background: #111c30;
  border-left-width: 3.5px;
}

.node-formula {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.3;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.node-name {
  font-size: 9.5px;
  font-weight: 500;
  color: rgba(180,200,230,0.55);
  margin-top: 3px;
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.node-topic-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--tc);
  display: inline-block;
  margin-right: 5px;
  vertical-align: middle;
  margin-top: -1px;
  opacity: 0.8;
}

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: 54px;
  background: rgba(8,12,20,0.92);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 18px;
  backdrop-filter: blur(16px);
}

.logo {
  font-size: 14px;
  font-weight: 700;
  color: #e8f4ff;
  white-space: nowrap;
  letter-spacing: -0.03em;
}
.logo span { color: var(--fields); }

.topic-filters {
  display: flex;
  gap: 5px;
  flex-wrap: nowrap;
  overflow-x: auto;
  flex: 1;
}
.topic-filters::-webkit-scrollbar { display: none; }

.topic-btn {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 4px;
  border: 1.5px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  background: rgba(255,255,255,0.04);
  color: rgba(180,200,230,0.6);
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.topic-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
.topic-btn.active { color: #000 !important; font-weight: 700; border-color: transparent; }

#search {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 7px 12px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  color: #e0eaf8;
  outline: none;
  width: 170px;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--fields); }
#search::placeholder { color: rgba(180,200,230,0.3); }

.clear-btn {
  font-size: 11px;
  padding: 6px 10px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,255,255,0.08);
  color: rgba(180,200,230,0.45);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.clear-btn:hover { color: #e0eaf8; border-color: rgba(255,255,255,0.2); }

/* ── SIDE PANEL ── */
#panel {
  position: fixed;
  top: 54px; right: 0; bottom: 0;
  width: 420px;
  background: #080e1c;
  border-left: 1px solid rgba(255,255,255,0.07);
  z-index: 200;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#panel.open { transform: translateX(0); }

#panel-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
  position: relative;
}

.ph-topic {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid;
  display: inline-block;
  margin-bottom: 10px;
}

.ph-formula {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 4px;
}

.ph-name {
  font-size: 12px;
  font-weight: 400;
  color: rgba(180,200,230,0.5);
}

.ph-given {
  display: inline-block;
  margin-left: 8px;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  background: rgba(255,210,0,0.12);
  color: #ffd700;
  border: 1px solid rgba(255,210,0,0.25);
  border-radius: 3px;
  letter-spacing: 0.08em;
  vertical-align: middle;
}

.close-btn {
  position: absolute;
  top: 14px; right: 14px;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: rgba(180,200,230,0.4);
  border-radius: 5px;
  font-size: 15px;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.close-btn:hover { color: #fff; background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }

#panel-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}
#panel-scroll::-webkit-scrollbar { width: 3px; }
#panel-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* Panel Sections */
.psec {
  padding: 14px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.045);
}

.psec-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(180,200,230,0.35);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.psec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.05);
}

/* Variables table */
.var-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.var-table tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
.var-table tr:last-child { border-bottom: none; }
.var-table td {
  padding: 5px 0;
  vertical-align: top;
  line-height: 1.5;
}
.var-sym {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  min-width: 50px;
  color: #fff;
}
.var-unit {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(180,200,230,0.4);
  min-width: 56px;
  padding-left: 8px;
}
.var-desc {
  color: rgba(180,200,230,0.7);
  font-size: 11.5px;
  padding-left: 8px;
}

/* Worked example */
.worked-step {
  display: flex;
  gap: 10px;
  margin-bottom: 9px;
  align-items: flex-start;
}
.step-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  color: rgba(180,200,230,0.6);
  font-size: 9px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.step-text {
  font-size: 12px;
  color: rgba(180,200,230,0.82);
  line-height: 1.6;
}
.step-math {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: #fff;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  padding: 7px 10px;
  margin-top: 4px;
  display: block;
  line-height: 1.7;
}

/* Memory tip */
.tip-box {
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.15);
  border-left: 3px solid #ffd700;
  border-radius: 5px;
  padding: 10px 12px;
  font-size: 12px;
  color: rgba(240,220,150,0.9);
  line-height: 1.6;
}

/* Common mistakes */
.mistake-item {
  display: flex;
  gap: 9px;
  align-items: flex-start;
  margin-bottom: 8px;
}
.mistake-item:last-child { margin-bottom: 0; }
.mistake-icon {
  color: #ff6b6b;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 1px;
}
.mistake-text {
  font-size: 12px;
  color: rgba(240,180,180,0.8);
  line-height: 1.5;
}

/* Connections */
.conn-item {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.12s;
  border-radius: 4px;
  padding: 7px 8px;
  margin: 0 -8px;
}
.conn-item:hover { background: rgba(255,255,255,0.04); }
.conn-item:last-child { border-bottom: none; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.conn-right { flex: 1; }
.conn-f {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 2px;
}
.conn-why {
  font-size: 10.5px;
  color: rgba(180,200,230,0.42);
  line-height: 1.4;
}

/* ── ZOOM CONTROLS ── */
#zoom-controls {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.zoom-btn {
  width: 36px; height: 36px;
  background: rgba(13,21,38,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(180,200,230,0.7);
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-family: 'JetBrains Mono', monospace;
  backdrop-filter: blur(8px);
}
.zoom-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(20,33,58,0.98); }
.zoom-btn.fit { font-size: 11px; font-weight: 700; letter-spacing: -0.02em; }

/* ── HINT ── */
#hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: rgba(180,200,230,0.22);
  z-index: 50;
  pointer-events: none;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

/* ── PAN CURSOR ON BACKGROUND ── */
#pan-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  cursor: grab;
}
#pan-layer.panning { cursor: grabbing; }
</style>
</head>
<body>

<div id="pan-layer"></div>
<canvas id="link-canvas"></canvas>
<div id="node-layer"><div id="world"></div></div>

<div id="topbar">
  <div class="logo">AQA <span>Physics</span> · Equation Web</div>
  <div class="topic-filters" id="topic-filters"></div>
  <input type="search" id="search" placeholder="Search…" autocomplete="off">
  <button class="clear-btn" id="clear-btn">✕ Reset</button>
</div>

<div id="panel">
  <div id="panel-head">
    <div class="ph-topic" id="ph-topic"></div>
    <div class="ph-formula" id="ph-formula"></div>
    <div class="ph-name" id="ph-name"></div>
    <div class="close-btn" id="close-btn">✕</div>
  </div>
  <div id="panel-scroll"></div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" id="btn-zoomin" title="Zoom in">+</button>
  <button class="zoom-btn fit" id="btn-fit" title="Fit all">FIT</button>
  <button class="zoom-btn" id="btn-zoomout" title="Zoom out">−</button>
</div>

<div id="hint">DRAG background to pan · SCROLL to zoom · CLICK any equation</div>

<script>
// ════════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════════
const TOPICS = {
  mech:   { label:'Mechanics',       color:'#f0a500' },
  waves:  { label:'Waves',           color:'#00d68f' },
  parts:  { label:'Particles',       color:'#ff6b9d' },
  elec:   { label:'Electricity',     color:'#9b8fff' },
  shm:    { label:'SHM & Circular',  color:'#ffe57a' },
  fields: { label:'Fields',          color:'#4dabf7' },
  nuke:   { label:'Nuclear',         color:'#ffa94d' },
  therm:  { label:'Thermal',         color:'#ff6b6b' },
  astro:  { label:'Astrophysics',    color:'#38d9d9' },
};

const nodes = [
// ── MECHANICS ──────────────────────────────────────────────────
{ id:'suvat1', f:'v = u + at', name:'SUVAT: Velocity', topic:'mech', given:false,
  vars:[['u','m/s','Initial velocity'],['v','m/s','Final velocity'],['a','m/s²','Acceleration'],['t','s','Time']],
  tip:'Only valid under CONSTANT acceleration. In gravity questions, a = 9.81 m/s² downward (use −9.81 if upward positive).',
  steps:['Identify: u=20 m/s, a=−4 m/s² (braking), find t when v=0.','Substitute: 0 = 20 + (−4)t','Solve: t = 20/4 = 5 s','Now use s = ½(u+v)t = ½×20×5 = 50 m stopping distance.'],
  mistake:['Forgetting the minus sign when decelerating — a is NOT always 9.81.','Using this equation when acceleration varies (e.g. air resistance).'],
  memory:'v = u + at → "V equals U plus AT" — velocity starts at u, increases by at.' },

{ id:'suvat2', f:'s = ut + ½at²', name:'SUVAT: Displacement', topic:'mech', given:false,
  vars:[['s','m','Displacement'],['u','m/s','Initial velocity'],['a','m/s²','Acceleration'],['t','s','Time']],
  tip:'Use when you know time and want displacement. For free-fall from rest: s = ½gt² (u=0 drops out).',
  steps:['Ball dropped from rest off 45 m cliff. u=0, a=9.81, s=45.','45 = 0 + ½(9.81)t²','t² = 45/4.905 = 9.17','t = √9.17 = 3.03 s'],
  mistake:['Forgetting the ½ factor in ½at².','Using displacement instead of distance for non-straight paths.'],
  memory:'Think: displacement = initial drift + extra due to acceleration. The ½ comes from averaging.' },

{ id:'suvat3', f:'v² = u² + 2as', name:'SUVAT: No Time', topic:'mech', given:false,
  vars:[['v','m/s','Final velocity'],['u','m/s','Initial velocity'],['a','m/s²','Acceleration'],['s','m','Displacement']],
  tip:'Use this when the question gives NO time data. Perfect for "what speed does it hit the ground?" questions.',
  steps:['Arrow launched at 30 m/s upward. At max height v=0.','0 = 30² + 2(−9.81)s','s = 900/(2×9.81) = 45.9 m','No stopwatch needed!'],
  mistake:['Not spotting that time is absent — the giveaway to use this equation.','s is displacement not distance — matters for return journeys.'],
  memory:'Derived by eliminating t between v=u+at and s=½(u+v)t. No time = no problem.' },

{ id:'suvat4', f:'s = ½(u+v)t', name:'SUVAT: Average Velocity', topic:'mech', given:false,
  vars:[['s','m','Displacement'],['u','m/s','Initial velocity'],['v','m/s','Final velocity'],['t','s','Time']],
  tip:'Most elegant SUVAT — displacement = average velocity × time. Works when you know both u and v.',
  steps:['Car: u=0, v=24 m/s, t=8 s.','s = ½(0+24)×8 = 96 m','Also the area under a v-t graph (trapezium).'],
  mistake:['This ONLY works for uniform acceleration — average velocity is NOT always ½(u+v) otherwise.'],
  memory:'Area of a trapezium = ½(sum of parallel sides) × height. That\'s all this is.' },

{ id:'newton2', f:'F = ma', name:"Newton's 2nd Law", topic:'mech', given:false,
  vars:[['F','N','Resultant (net) force'],['m','kg','Mass'],['a','m/s²','Acceleration']],
  tip:'F is the RESULTANT force — subtract weight, friction, drag. If multiple forces act, resolve them first.',
  steps:['Rocket: thrust=80 kN, weight=49 kN, m=5000 kg.','Net F = 80000−49000 = 31000 N upward.','a = F/m = 31000/5000 = 6.2 m/s²','Then use SUVAT to find velocity/displacement.'],
  mistake:['Using total force not NET force — always subtract opposing forces.','Forgetting to convert grams to kg or kN to N.'],
  memory:'F = ma → "Force Makes it Accelerate." Rearrange freely: a=F/m, m=F/a.' },

{ id:'weight', f:'W = mg', name:'Weight', topic:'mech', given:false,
  vars:[['W','N','Weight (force due to gravity)'],['m','kg','Mass'],['g','m/s²','Gravitational field strength (9.81 on Earth)']],
  tip:'Weight is a FORCE (Newtons), not a mass. Mass is the same everywhere; weight depends on g of the planet.',
  steps:['70 kg person on Earth: W = 70×9.81 = 686.7 N','On Moon (g=1.6): W = 70×1.6 = 112 N','On ISS: still has weight (gravity still acts!) — they are in free-fall, not weightless.'],
  mistake:['Saying weight = mass. WRONG. Weight is in Newtons, mass in kg.','Using g=10 when question says use g=9.81 — costs marks.'],
  memory:'g = 9.81 N/kg = 9.81 m/s². These are the SAME quantity with different units.' },

{ id:'momentum', f:'p = mv', name:'Momentum', topic:'mech', given:false,
  vars:[['p','kg m/s','Momentum (vector)'],['m','kg','Mass'],['v','m/s','Velocity (vector)']],
  tip:'Momentum is ALWAYS conserved in collisions (closed system). It is a VECTOR — direction matters.',
  steps:['Cricket ball 0.16 kg at 40 m/s: p = 6.4 kg m/s','After catch (v=0): Δp = 6.4 kg m/s','F = Δp/Δt: spread over 0.5 s → F = 12.8 N. Soft hands!'],
  mistake:['Ignoring direction in collisions — set up a positive direction first.','Confusing momentum with kinetic energy — very different quantities.'],
  memory:'p for momentum (from Latin "petere" — to rush). Always: total p before = total p after.' },

{ id:'impulse', f:'FΔt = Δp', name:'Impulse', topic:'mech', given:true,
  vars:[['F','N','Force'],['Δt','s','Contact time'],['Δp','kg m/s','Change in momentum']],
  tip:'Impulse = area under a Force–time graph. Same Δp can be achieved with large F for short time, or small F for long time.',
  steps:['Ball hits wall: m=0.4 kg, u=15 m/s, bounces at 12 m/s.','Δp = m(v−u) = 0.4(−12−15) = −10.8 kg m/s','Contact time=0.008 s: F = 10.8/0.008 = 1350 N','Airbag 0.1 s: F = 10.8/0.1 = 108 N — 12.5× less!'],
  mistake:['Sign error: if ball reverses direction, Δp = m(−v−u) — both speeds contribute.','Using speed instead of velocity — direction changes MUST be included.'],
  memory:'Impulse = FΔt = Δ(mv). More time → less force for same change. That is why crumple zones save lives.' },

{ id:'ke', f:'Eₖ = ½mv²', name:'Kinetic Energy', topic:'mech', given:false,
  vars:[['Eₖ','J','Kinetic energy'],['m','kg','Mass'],['v','m/s','Speed']],
  tip:'KE ∝ v² — doubling speed QUADRUPLES kinetic energy! This is why stopping distances increase so rapidly with speed.',
  steps:['1200 kg car at 30 m/s: Eₖ = ½×1200×900 = 540 000 J','Same car at 60 m/s: Eₖ = 2 160 000 J','4× the energy — takes 4× the stopping distance.'],
  mistake:['Forgetting the ½ factor.','Using velocity squared: v² not v in the formula.'],
  memory:'½mv². The ½ comes from integrating F=ma over displacement. Quadruples with double speed.' },

{ id:'gpe', f:'Eₚ = mgh', name:'Gravitational PE', topic:'mech', given:false,
  vars:[['Eₚ','J','Gravitational potential energy'],['m','kg','Mass'],['g','m/s²','9.81 m/s²'],['h','m','Height above reference']],
  tip:'h is measured from a reference point of your choice. In energy conservation questions, set ground as h=0.',
  steps:['Rollercoaster car 500 kg drops 40 m.','Eₚ lost = 500×9.81×40 = 196 200 J','All → Eₖ: ½mv² = 196 200','v = √(2×196200/500) = 28.0 m/s at bottom.'],
  mistake:['Forgetting to use the CHANGE in height, not total height.','Not equating Eₚ to Eₖ — energy conservation is the key step.'],
  memory:'mgh. Say it: "em-gee-aitch." Energy = mass × g × height. Simple, but appears in almost every A-level mechanics question.' },

{ id:'work', f:'W = Fs cosθ', name:'Work Done', topic:'mech', given:false,

// BUILD INDEX

const byId = {};
nodes.forEach(n => { byId[n.id] = n; });
const adj = {};
nodes.forEach(n => { adj[n.id] = []; });
links.forEach(l => {
  if (!adj[l.s]) adj[l.s] = [];
  if (!adj[l.t]) adj[l.t] = [];
  if (byId[l.s] && byId[l.t]) {
    adj[l.s].push({ id:l.t, reason:l.r });
    adj[l.t].push({ id:l.s, reason:l.r });
  }
});

const filterBar = document.getElementById('topic-filters');
Object.entries(TOPICS).forEach(([key, t]) => {
  const btn = document.createElement('button');
  btn.className = 'topic-btn';
  btn.dataset.topic = key;
  btn.textContent = t.label;
  btn.addEventListener('click', () => toggleTopicFilter(key, btn, t.color));
  filterBar.appendChild(btn);
});

let activeTopicFilter = null;
function toggleTopicFilter(key, btn, color) {
  if (activeTopicFilter === key) {
    activeTopicFilter = null;
    document.querySelectorAll('.topic-btn').forEach(b => {
      b.classList.remove('active');
      b.style.background = '';
      b.style.color = '';
    });
    applyDimming(null);
  } else {
    activeTopicFilter = key;
    document.querySelectorAll('.topic-btn').forEach(b => {
      b.classList.remove('active');
      b.style.background = '';
      b.style.color = '';
    });
    btn.classList.add('active');
    btn.style.background = color;
    btn.style.color = '#000';
    applyDimming(key);
  }
}

function applyDimming(topicKey) {
  document.querySelectorAll('.node-card').forEach(card => {
    if (!topicKey) {
      card.classList.remove('dimmed');
    } else {
      card.classList.toggle('dimmed', card.dataset.topic !== topicKey);
    }
  });
}

// LAYOUT: unified world transform
// ════════════════════════════════════════════════════════════════
const canvas = document.getElementById('link-canvas');
const ctx = canvas.getContext('2d');
const world = document.getElementById('world');
const panLayer = document.getElementById('pan-layer');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ── WORLD TRANSFORM STATE (must be before resizeCanvas call) ─────
let tx = 0, ty = 54, scale = 1;

function resizeCanvas() { canvas.width = W(); canvas.height = H(); if (window._ready) drawLinks(); }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function applyTransform() {
  world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  if (window._ready) drawLinks();
}

// ── CLUSTER CENTRES (in a large 3000×2000 world space) ──────────
const clusters = {
  mech:   { x:0.18, y:0.36 },
  waves:  { x:0.40, y:0.18 },
  parts:  { x:0.62, y:0.20 },
  elec:   { x:0.76, y:0.42 },
  shm:    { x:0.18, y:0.62 },
  fields: { x:0.68, y:0.64 },
  nuke:   { x:0.48, y:0.76 },
  therm:  { x:0.30, y:0.74 },
  astro:  { x:0.74, y:0.18 },
};
const WW = 3000, WH = 2000;

nodes.forEach(n => {
  const c = clusters[n.topic];
  n.x = c.x * WW + (Math.random()-0.5)*160;
  n.y = c.y * WH + (Math.random()-0.5)*140;
  n.vx = 0; n.vy = 0;
});

// ── CREATE NODE CARDS in #world ──────────────────────────────────
const cardEls = {};
const NODE_W = 148, NODE_H = 52;

nodes.forEach(n => {
  const tc = TOPICS[n.topic].color;
  const div = document.createElement('div');
  div.className = 'node-card';
  div.dataset.id = n.id;
  div.dataset.topic = n.topic;
  div.style.setProperty('--tc', tc);
  div.innerHTML = `
    <div class="node-inner">
      <div class="node-formula">${n.f}</div>
      <div class="node-name">
        <span class="node-topic-dot" style="background:${tc}"></span>${n.name}
      </div>
    </div>`;
  div.addEventListener('mousedown', e => startNodeDrag(e, n));
  world.appendChild(div);
  cardEls[n.id] = div;
});

function updatePositions() {
  nodes.forEach(n => {
    const el = cardEls[n.id];
    el.style.left = Math.round(n.x - NODE_W/2) + 'px';
    el.style.top  = Math.round(n.y - NODE_H/2) + 'px';
  });
}

// ── PAN (drag on background / canvas) ────────────────────────────
let isPanning = false;
let panStart = {x:0,y:0}, panOrigin = {x:0,y:0};
let panMoved = false;

function onPanStart(e) {
  if (e.button !== 0) return;
  isPanning = true; panMoved = false;
  panStart  = { x: e.clientX, y: e.clientY };
  panOrigin = { x: tx, y: ty };
  panLayer.classList.add('panning');
}
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const dx = e.clientX - panStart.x, dy = e.clientY - panStart.y;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) panMoved = true;
  tx = panOrigin.x + dx;
  ty = panOrigin.y + dy;
  applyTransform();
});
window.addEventListener('mouseup', () => { isPanning = false; panLayer.classList.remove('panning'); });
panLayer.addEventListener('mousedown', onPanStart);
panLayer.addEventListener('click', () => { if (!panMoved) clearSelection(); });

// ── ZOOM ─────────────────────────────────────────────────────────
function zoomAt(cx, cy, factor) {
  const ns = Math.max(0.15, Math.min(2.5, scale * factor));
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns;
  applyTransform();
}

window.addEventListener('wheel', e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? 0.91 : 1.10);
}, { passive: false });

document.getElementById('btn-zoomin').addEventListener('click',  () => zoomAt(W()/2, H()/2, 1.3));
document.getElementById('btn-zoomout').addEventListener('click', () => zoomAt(W()/2, H()/2, 0.77));
document.getElementById('btn-fit').addEventListener('click', fitAll);

function fitAll() {
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n => {
    minX=Math.min(minX,n.x-NODE_W/2); minY=Math.min(minY,n.y-NODE_H/2);
    maxX=Math.max(maxX,n.x+NODE_W/2); maxY=Math.max(maxY,n.y+NODE_H/2);
  });
  const pad=60, avW=W()-pad*2, avH=H()-54-pad*2;
  const ns = Math.min(avW/(maxX-minX), avH/(maxY-minY), 1.1);
  tx = pad - minX*ns;
  ty = 54 + pad - minY*ns;
  scale = ns;
  applyTransform();
}

// ── DRAG NODES ───────────────────────────────────────────────────
// Single source of truth: a node is "being dragged" if mouse moved > threshold
let activeDrag = null; // { node, startX, startY, ox, oy, moved }

function startNodeDrag(e, n) {
  if (e.button !== 0) return;
  e.stopPropagation();
  activeDrag = { node:n, startX:e.clientX, startY:e.clientY, ox:n.x, oy:n.y, moved:false };
  n.fx = n.x; n.fy = n.y;

  function onMove(ev) {
    if (!activeDrag) return;
    const dx=(ev.clientX-activeDrag.startX)/scale, dy=(ev.clientY-activeDrag.startY)/scale;
    if (Math.abs(dx)>4||Math.abs(dy)>4) activeDrag.moved=true;
    if (activeDrag.moved) {
      n.x=activeDrag.ox+dx; n.y=activeDrag.oy+dy;
      n.fx=n.x; n.fy=n.y;
      updatePositions(); drawLinks();
    }
  }
  function onUp(ev) {
    if (!activeDrag) return;
    const wasDrag = activeDrag.moved;
    n.fx=null; n.fy=null;
    activeDrag=null;
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('mouseup',onUp);
    // If it was a clean click (no drag), select the node
    if (!wasDrag) selectNode(n);
  }
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onUp);
}

// ── D3 SIMULATION ────────────────────────────────────────────────
const validLinks = links.filter(l => byId[l.s] && byId[l.t]);
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(validLinks.map(l=>({source:l.s,target:l.t})))
    .id(d=>d.id).distance(200).strength(0.18))
  .force('charge', d3.forceManyBody().strength(-400))
  .force('collision', d3.forceCollide(95))
  .force('cluster', () => {
    nodes.forEach(n => {
      if (!n.fx) n.vx += (clusters[n.topic].x*WW - n.x)*0.010;
      if (!n.fy) n.vy += (clusters[n.topic].y*WH - n.y)*0.010;
    });
  })
  .alphaDecay(0.007)
  .on('tick', () => { updatePositions(); drawLinks(); });

// Fit once settled
sim.on('end', fitAll);
setTimeout(fitAll, 2500);

// ── DRAW LINKS ───────────────────────────────────────────────────
let activeNodeId = null;
window._ready = true; // all variables now declared — safe to call drawLinks
resizeCanvas();       // now do the initial canvas size + draw

function drawLinks() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);

  validLinks.forEach(l => {
    const src = byId[l.s], tgt = byId[l.t];
    if (!src||!tgt) return;
    const isActive = activeNodeId && (l.s===activeNodeId||l.t===activeNodeId);
    if (activeNodeId && !isActive) {
      ctx.globalAlpha=0.04; ctx.strokeStyle='#4a7a9b'; ctx.lineWidth=1/scale;
    } else if (isActive) {
      ctx.globalAlpha=0.85; ctx.strokeStyle=TOPICS[byId[activeNodeId].topic].color; ctx.lineWidth=2.5/scale;
    } else {
      ctx.globalAlpha=0.14; ctx.strokeStyle='#5a8aad'; ctx.lineWidth=1.2/scale;
    }
    ctx.beginPath(); ctx.moveTo(src.x,src.y); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
    if (isActive) {
      const angle=Math.atan2(tgt.y-src.y,tgt.x-src.x);
      const mx=(src.x+tgt.x)/2, my=(src.y+tgt.y)/2, a=8/scale;
      ctx.beginPath();
      ctx.moveTo(mx+a*Math.cos(angle-0.42),my+a*Math.sin(angle-0.42));
      ctx.lineTo(mx+a*1.6*Math.cos(angle),my+a*1.6*Math.sin(angle));
      ctx.lineTo(mx+a*Math.cos(angle+0.42),my+a*Math.sin(angle+0.42));
      ctx.fillStyle=ctx.strokeStyle; ctx.globalAlpha=0.75; ctx.fill();
    }
  });
  ctx.restore();
  ctx.globalAlpha=1;
}

// ════════════════════════════════════════════════════════════════
// SELECTION & PANEL
// ════════════════════════════════════════════════════════════════
function selectNode(n) {
  activeNodeId = n.id;
  const neighbours = new Set(adj[n.id].map(x => x.id));
  neighbours.add(n.id);
  document.querySelectorAll('.node-card').forEach(el => {
    const id = el.dataset.id;
    el.classList.remove('selected','neighbour','dimmed');
    if (id === n.id) el.classList.add('selected');
    else if (neighbours.has(id)) el.classList.add('neighbour');
    else if (activeTopicFilter === null) el.classList.add('dimmed');
  });
  drawLinks();
  openPanel(n);
}

function clearSelection() {
  activeNodeId = null;
  activeTopicFilter = null;
  document.querySelectorAll('.node-card').forEach(el => el.classList.remove('selected','neighbour','dimmed'));
  document.querySelectorAll('.topic-btn').forEach(b => { b.classList.remove('active'); b.style.background=''; b.style.color=''; });
  document.getElementById('search').value = '';
  closePanel();
  drawLinks();
}
document.getElementById('clear-btn').addEventListener('click', clearSelection);

// ── PANEL BUILDER ────────────────────────────────────────────────
function openPanel(n) {
  const t = TOPICS[n.topic];
  const ph = document.getElementById('ph-topic');
  ph.textContent = t.label;
  ph.style.color = t.color;
  ph.style.borderColor = t.color;
  ph.style.background = t.color + '18';

  const pf = document.getElementById('ph-formula');
  pf.textContent = n.f;
  pf.style.color = t.color;

  document.getElementById('ph-name').innerHTML =
    n.name + (n.given ? '<span class="ph-given">★ GIVEN IN EXAM</span>' : '');

  const scroll = document.getElementById('panel-scroll');
  scroll.innerHTML = '';

  // 1. Variables
  if (n.vars && n.vars.length) {
    const sec = makeSec('Variables & Units');
    const tbl = document.createElement('table');
    tbl.className = 'var-table';
    n.vars.forEach(([sym, unit, desc]) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="var-sym">${sym}</td><td class="var-unit">${unit}</td><td class="var-desc">${desc}</td>`;
      tbl.appendChild(tr);
    });
    sec.body.appendChild(tbl);
    scroll.appendChild(sec.el);
  }

  // 2. Worked example
  if (n.steps && n.steps.length) {
    const sec = makeSec('⚡ Exam Worked Example');
    n.steps.forEach((s, i) => {
      const ismath = s.includes('=') || s.includes('→') || s.startsWith('v ') || /^\d/.test(s);
      if (ismath) {
        const code = document.createElement('code');
        code.className = 'step-math';
        code.textContent = s;
        sec.body.appendChild(code);
      } else {
        const div = document.createElement('div');
        div.className = 'worked-step';
        div.innerHTML = `<span class="step-num">${i+1}</span><span class="step-text">${s}</span>`;
        sec.body.appendChild(div);
      }
    });
    scroll.appendChild(sec.el);
  }

  // 3. Memory tip
  if (n.memory) {
    const sec = makeSec('💡 Memory Tip');
    const box = document.createElement('div');
    box.className = 'tip-box';
    box.textContent = n.memory;
    sec.body.appendChild(box);
    scroll.appendChild(sec.el);
  }

  // 4. Common mistakes
  if (n.mistake && n.mistake.length) {
    const sec = makeSec('⚠️ Common Exam Mistakes');
    n.mistake.forEach(m => {
      const div = document.createElement('div');
      div.className = 'mistake-item';
      div.innerHTML = `<span class="mistake-icon">✗</span><span class="mistake-text">${m}</span>`;
      sec.body.appendChild(div);
    });
    scroll.appendChild(sec.el);
  }

  // 5. Connections
  const neighbours = adj[n.id] || [];
  if (neighbours.length) {
    const sec = makeSec(`🔗 Connects To (${neighbours.length})`);
    neighbours.forEach(nb => {
      const nd = byId[nb.id];
      if (!nd) return;
      const nt = TOPICS[nd.topic];
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.innerHTML = `
        <span class="conn-dot" style="background:${nt.color}"></span>
        <div class="conn-right">
          <div class="conn-f" style="color:${nt.color}">${nd.f} <span style="font-family:Outfit;font-weight:400;font-size:10px;color:rgba(180,200,230,0.4)">${nd.name}</span></div>
          <div class="conn-why">${nb.reason}</div>
        </div>`;
      item.addEventListener('click', () => selectNode(nd));
      sec.body.appendChild(item);
    });
    scroll.appendChild(sec.el);
  }

  document.getElementById('panel').classList.add('open');
}

function makeSec(label) {
  const el = document.createElement('div');
  el.className = 'psec';
  const lbl = document.createElement('div');
  lbl.className = 'psec-label';
  lbl.textContent = label;
  const body = document.createElement('div');
  el.appendChild(lbl);
  el.appendChild(body);
  return { el, body };
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}
document.getElementById('close-btn').addEventListener('click', closePanel);

// ── SEARCH ────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { clearSelection(); return; }
  const hits = nodes.filter(n =>
    n.f.toLowerCase().includes(q) ||
    n.name.toLowerCase().includes(q) ||
    (n.vars||[]).some(v => v[2].toLowerCase().includes(q))
  );
  const hitIds = new Set(hits.map(n => n.id));
  activeNodeId = null;
  document.querySelectorAll('.node-card').forEach(el => {
    el.classList.toggle('dimmed', !hitIds.has(el.dataset.id));
    el.classList.remove('selected','neighbour');
  });
  if (hits.length === 1) selectNode(hits[0]);
  drawLinks();
});

// Initial draw
updatePositions();
drawLinks();
</script>
</body>
</html>
